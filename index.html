<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Astral Fretboard Trainer V13</title>
<style>
:root{--bg:#080b12;--panel:#121826;--line:#28334a;--text:#f5f7ff;--muted:#aab4c8;--accent:#facc15;--pink:#fb7185;--blue:#223453;--green:#86efac}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#172033 0,#080b12 55%);color:var(--text);padding:8px}.app{max-width:1180px;margin:0 auto;padding-bottom:18px}.mainGrid{display:grid;grid-template-columns:minmax(320px,420px) 1fr;gap:10px;align-items:start}.spanAll{grid-column:1/-1}@media (max-width:850px){.mainGrid{display:block}}h1{font-size:1rem;margin:4px 0 2px}.sub{font-size:.72rem;color:var(--muted);margin-bottom:7px}.card{background:rgba(18,24,38,.94);border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:9px;margin-bottom:8px}.modeSwitch,.toggles{display:grid;grid-template-columns:1fr 1fr;gap:7px}.controls{display:grid;grid-template-columns:.62fr 1.38fr;gap:7px;margin-top:7px}.full{grid-column:1/-1}label{display:block;font-size:.62rem;color:var(--muted);margin:0 0 3px 2px}select,button{width:100%;border:1px solid var(--line);background:#0b101b;color:var(--text);border-radius:11px;padding:7px 8px;font-size:.82rem}button.active{border-color:#60a5fa;background:#10233d}button.primary{border-color:var(--accent);background:#221d0a}.selected{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px}.big{font-size:1.1rem;font-weight:950}.big span{color:var(--accent)}.notes{font-size:.78rem;color:var(--muted);margin-top:1px}.badge{font-size:.68rem;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 7px}.chips{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.chip{border:1px solid var(--line);background:#0b101b;border-radius:10px;padding:5px 2px;text-align:center;cursor:pointer}.chip.active{border-color:var(--accent);background:#221d0a}.chip .deg{font-size:.55rem;color:var(--muted)}.chip .name{font-size:.82rem;font-weight:900}.chip .qual{font-size:.55rem;color:var(--muted)}.fretCard{padding:7px}.zoomRow{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;margin-bottom:6px;font-size:.62rem;color:var(--muted)}input[type=range]{width:100%}.fretScroller{overflow-x:auto;-webkit-overflow-scrolling:touch}.fretInner{min-width:100%}.fretNums,.string{display:grid;grid-template-columns:34px repeat(var(--fret-count),1fr);width:100%}.fretNums{font-size:.55rem;color:var(--muted);text-align:center;padding:0 0 3px}.fretboard{width:100%;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#0b101b}.string{height:34px;border-bottom:1px solid rgba(255,255,255,.06)}.string:last-child{border-bottom:0}.slabel{position:relative;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,rgba(202,167,96,.28),#070b12);color:var(--muted);font-weight:800;border-right:4px solid #caa760;font-size:.65rem;min-width:0}.slabel .stringText{position:absolute;left:3px;top:2px;font-size:.48rem;color:#d6bd7a;text-transform:uppercase;letter-spacing:.03em}.slabel .note{box-shadow:0 0 0 2px rgba(202,167,96,.35)}.fret{position:relative;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.09);min-width:0}.fret::after{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(255,255,255,.16)}.fret.openFret{background:linear-gradient(90deg,rgba(202,167,96,.28),rgba(255,255,255,.035));border-right:3px solid #caa760}.fret.openFret::before{content:"open";position:absolute;top:2px;font-size:.44rem;letter-spacing:.03em;color:#d6bd7a;opacity:.9;text-transform:uppercase}.fret.openFret .note{box-shadow:0 0 0 2px rgba(202,167,96,.35)}.note{position:relative;z-index:1;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.56rem;font-weight:950;color:transparent}.note.scale{background:var(--blue);color:#cfe3ff}.note.arp{background:var(--accent);color:#1b1300}.note.root{background:var(--pink);color:white}.note.both{outline:2px solid rgba(255,255,255,.28)}.legend{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}.legend div{font-size:.6rem;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 6px;background:#0b101b}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px}.lesson{font-size:.74rem;color:#dbeafe;line-height:1.25}.lesson b{color:white}.hidden{display:none!important}.shapeCard{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.shapeTitle{font-size:1.15rem;font-weight:950}.shapeTitle span{color:var(--green)}.shapeSub{font-size:.76rem;color:var(--muted);line-height:1.25;margin-top:2px}.diagram{width:124px;height:154px;background:#0b101b;border:1px solid var(--line);border-radius:12px;padding:12px 10px 8px;position:relative}.vline,.hline{position:absolute;background:rgba(255,255,255,.25)}.vline{top:29px;bottom:28px;width:1px}.hline{left:17px;right:17px;height:1px}.finger{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#1b1300;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;transform:translate(-50%,-50%)}.barre{position:absolute;height:18px;border-radius:999px;background:var(--pink);color:white;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:900;transform:translateY(-50%)}.openRow{position:absolute;top:6px;left:17px;right:17px;display:grid;grid-template-columns:repeat(6,1fr);font-size:.6rem;color:var(--muted);text-align:center}.stringNames{position:absolute;bottom:7px;left:17px;right:17px;display:grid;grid-template-columns:repeat(6,1fr);font-size:.54rem;color:var(--muted);text-align:center}.fretLabel{position:absolute;left:6px;top:31px;font-size:.6rem;color:var(--muted)}footer{text-align:center;color:var(--muted);font-size:.74rem;padding:14px 0 6px}.mainGrid .card{height:auto}@media (min-width:851px){.chips{grid-template-columns:repeat(7,minmax(70px,1fr))}.string{height:40px}.note{width:28px;height:28px;font-size:.64rem}.card{padding:11px}.fretCard{position:sticky;top:8px}}@media (max-width:520px){.shapeCard{grid-template-columns:1fr 124px}.string{height:31px}.note{width:21px;height:21px;font-size:.5rem}select,button{font-size:.78rem;padding:6px 7px}.card{padding:7px;margin-bottom:6px}h1{display:none}.sub{display:none}}
</style>
</head>
<body>
<div class="app">
  <h1>Astral Fretboard Trainer V13</h1><div class="sub">Scales, arpeggios, chords, capo shapes, and movable patterns.</div>
  <div class="card">
    <div class="modeSwitch"><button id="leadModeBtn" class="primary">Lead Mode</button><button id="chordModeBtn">Chord Mode</button></div>
    <div class="controls">
      <div class="full"><label>Instrument</label><select id="instrumentSelect"><option value="guitar">Guitar</option><option value="bass">Bass</option><option value="ukulele">Ukulele</option></select></div>
      <div><label>Key</label><select id="keySelect"></select></div>
      <div><label>Mode</label><select id="modeSelect"></select></div>
      <div id="leadControls" class="full"><label>Arpeggio</label><select id="arpSelect"></select></div>
      <div id="patternControls" class="full"><label>Scale view</label><select id="patternSelect"><option value="full">Full board</option><option value="3nps-0">Pattern 1</option><option value="3nps-1">Pattern 2</option><option value="3nps-2">Pattern 3</option><option value="3nps-3">Pattern 4</option><option value="3nps-4">Pattern 5</option><option value="3nps-5">Pattern 6</option><option value="3nps-6">Pattern 7</option></select></div>
      <div id="capoControls" class="full hidden"><label>Capo</label><select id="capoSelect"></select></div>
    </div>
    <div class="toggles" id="leadToggles"><button id="scaleBtn" class="active">Scale on</button><button id="namesBtn" class="active">Names on</button></div>
  </div>
  <div class="mainGrid">
  <div id="leadPanel">
    <div class="card"><div class="selected"><div><div class="big" id="bigChord"></div><div class="notes" id="arpNotes"></div></div><div class="badge" id="degreeBadge"></div></div><div class="legend"><div><span class="dot" style="background:var(--pink)"></span>root</div><div><span class="dot" style="background:var(--accent)"></span>arpeggio</div><div><span class="dot" style="background:var(--blue)"></span>scale</div></div></div>
    <div class="card fretCard"><div class="zoomRow"><span>Zoom</span><input id="zoomSlider" type="range" min="100" max="190" value="100" step="10"><span id="zoomText">100%</span></div><div class="fretScroller"><div class="fretInner" id="fretInner"><div class="fretNums" id="fretNums"></div><div class="fretboard" id="fretboard"></div></div></div></div>
  </div>
  <div id="chordPanel" class="hidden"><div class="card"><div class="shapeCard"><div><div class="shapeTitle" id="shapeTitle"></div><div class="shapeSub" id="shapeSub"></div></div><div id="diagramMount"></div></div></div></div>
  <div>
    <div class="card"><label>Chords in this key</label><div class="chips" id="chipGrid"></div></div>
    <div class="card"><div class="lesson" id="lesson"></div></div>
  </div>
  </div>
  <footer>made by Astral Studios LLC</footer>
</div>
<script>
const NOTES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"],FLAT={"C#":"Db","D#":"Eb","F#":"Gb","G#":"Ab","A#":"Bb"};
const INSTRUMENTS={
  guitar:{label:"Guitar",strings:["E","B","G","D","A","E"],chords:true},
  bass:{label:"Bass",strings:["G","D","A","E"],chords:false},
  ukulele:{label:"Ukulele",strings:["A","E","C","G"],chords:true}
};
let STRINGS=INSTRUMENTS.guitar.strings;
const modes={"Major / Ionian":{i:[0,2,4,5,7,9,11],q:["maj","min","min","maj","maj","min","dim"]},"Natural Minor / Aeolian":{i:[0,2,3,5,7,8,10],q:["min","dim","maj","min","min","maj","maj"]},"Dorian":{i:[0,2,3,5,7,9,10],q:["min","min","maj","maj","min","dim","maj"]},"Phrygian":{i:[0,1,3,5,7,8,10],q:["min","maj","maj","min","dim","maj","min"]},"Lydian":{i:[0,2,4,6,7,9,11],q:["maj","maj","min","dim","maj","min","min"]},"Mixolydian":{i:[0,2,4,5,7,9,10],q:["maj","min","dim","maj","min","min","maj"]},"Locrian":{i:[0,1,3,5,6,8,10],q:["dim","maj","min","min","maj","maj","min"]}};
const roman=["I","ii","iii","IV","V","vi","vii°"],longDeg=["1st / I","2nd / ii","3rd / iii","4th / IV","5th / V","6th / vi","7th / vii°"];
let state={instrument:"guitar",view:"lead",key:"A",mode:"Natural Minor / Aeolian",arp:0,showScale:true,showNames:true,pattern:"full",capo:0,zoom:100};
const OPEN={"C":{open:["x","","","","o","o"],f:[[5,3,3],[4,2,2],[2,1,1]]},"D":{open:["x","x","o","","",""],f:[[3,2,1],[1,2,2],[2,3,3]]},"E":{open:["o","","","","o","o"],f:[[4,2,2],[3,2,3],[2,1,1]]},"G":{open:["","","o","o","o",""],f:[[6,3,2],[5,2,1],[1,3,3]]},"A":{open:["x","o","","","","o"],f:[[4,2,1],[3,2,2],[2,2,3]]},"Am":{open:["x","o","","","o","o"],f:[[4,2,2],[3,2,3],[2,1,1]]},"Dm":{open:["x","x","o","","",""],f:[[3,2,2],[2,3,3],[1,1,1]]},"Em":{open:["o","","","o","o","o"],f:[[5,2,2],[4,2,3]]}};
const UKE_OPEN={
"C":{open:["o","o","o",""],f:[[1,3,3]]},
"D":{open:["","","","o"],f:[[4,2,1],[3,2,2],[2,2,3]]},
"E":{open:["","","",""],f:[[4,1,1],[3,4,4],[2,0,0],[1,2,2]]},
"F":{open:["","o","","o"],f:[[4,2,2],[2,1,1]]},
"G":{open:["o","","",""],f:[[3,2,1],[2,3,3],[1,2,2]]},
"A":{open:["","o","","o"],f:[[4,2,2],[3,1,1]]},
"B":{open:["","","",""],f:[[4,4,3],[3,3,2],[2,2,1],[1,2,1]]},
"Am":{open:["","o","o","o"],f:[[4,2,2]]},
"Bm":{open:["","","",""],f:[[4,4,3],[3,2,1],[2,2,1],[1,2,1]]},
"Cm":{open:["x","","",""],f:[[3,3,1],[2,3,1],[1,3,1]]},
"Dm":{open:["","o","",""],f:[[4,2,2],[3,2,3],[2,1,1]]},
"Em":{open:["o","","",""],f:[[3,4,3],[2,3,2],[1,2,1]]},
"Fm":{open:["","","",""],f:[[4,1,1],[3,0,0],[2,1,2],[1,3,4]]},
"Gm":{open:["o","","",""],f:[[3,2,2],[2,3,3],[1,1,1]]},
"Fdim":{open:["","","",""],f:[[4,1,1],[3,2,2],[2,1,3],[1,2,4]]},
"Bdim":{open:["","","",""],f:[[4,1,1],[3,2,2],[2,1,3],[1,2,4]]}
};
function idx(n){return NOTES.indexOf(n)}function simple(i){return NOTES[(i+120)%12]}function pretty(i){const n=simple(i);return FLAT[n]?`${n}/${FLAT[n]}`:n}function chordName(r,q){return q==="maj"?r:q==="min"?r+"m":r+"dim"}function chordLong(r,q){return r+" "+(q==="maj"?"Major":q==="min"?"Minor":"Diminished")}function chordInts(q){return q==="maj"?[0,4,7]:q==="min"?[0,3,7]:[0,3,6]}function scale(){const root=idx(state.key);return modes[state.mode].i.map(x=>(root+x)%12)}function chords(){const s=scale(),q=modes[state.mode].q;return s.map((root,i)=>({root,rootName:simple(root),quality:q[i],i}))}function arpNotes(){const c=chords()[state.arp];return chordInts(c.quality).map(x=>(c.root+x)%12)}function shapeActualName(c,capo){return chordName(simple(c.root-capo),c.quality)}
function setup(){instrumentSelect.value=state.instrument||"guitar";NOTES.forEach(n=>keySelect.add(new Option(pretty(idx(n)),n)));keySelect.value=state.key;Object.keys(modes).forEach(m=>modeSelect.add(new Option(m,m)));modeSelect.value=state.mode;for(let i=0;i<=7;i++)capoSelect.add(new Option(i===0?"No capo":`Capo ${i}`,i));instrumentSelect.onchange=e=>{state.instrument=e.target.value;STRINGS=INSTRUMENTS[state.instrument].strings;render(false)};keySelect.onchange=e=>{state.key=e.target.value;state.arp=0;render(true)};modeSelect.onchange=e=>{state.mode=e.target.value;state.arp=0;render(true)};arpSelect.onchange=e=>{state.arp=Number(e.target.value);render(false)};patternSelect.onchange=e=>{state.pattern=e.target.value;render(false)};capoSelect.onchange=e=>{state.capo=Number(e.target.value);render(false)};zoomSlider.oninput=e=>{state.zoom=Number(e.target.value);zoomText.textContent=state.zoom+"%";applyZoom()};leadModeBtn.onclick=()=>{state.view="lead";render(false)};chordModeBtn.onclick=()=>{state.view="chord";render(false)};scaleBtn.onclick=()=>{state.showScale=!state.showScale;scaleBtn.textContent=state.showScale?"Scale on":"Scale off";scaleBtn.classList.toggle("active",state.showScale);render(false)};namesBtn.onclick=()=>{state.showNames=!state.showNames;namesBtn.textContent=state.showNames?"Names on":"Names off";namesBtn.classList.toggle("active",state.showNames);render(false)};render(true)}
function render(rebuild){const s=scale(),cs=chords(),c=cs[state.arp],an=arpNotes();leadModeBtn.classList.toggle("primary",state.view==="lead");chordModeBtn.classList.toggle("primary",state.view==="chord");leadPanel.classList.toggle("hidden",state.view!=="lead");chordPanel.classList.toggle("hidden",state.view!=="chord");leadControls.classList.toggle("hidden",state.view!=="lead");patternControls.classList.toggle("hidden",state.view!=="lead");leadToggles.classList.toggle("hidden",state.view!=="lead");capoControls.classList.toggle("hidden",state.view!=="chord");if(rebuild){arpSelect.innerHTML="";cs.forEach((x,i)=>arpSelect.add(new Option(`${longDeg[i]} — ${chordLong(x.rootName,x.quality)} (${chordName(x.rootName,x.quality)})`,i)))}arpSelect.value=state.arp;bigChord.innerHTML=`${chordLong(c.rootName,c.quality)} <span>${chordName(c.rootName,c.quality)}</span>`;document.getElementById("arpNotes").textContent=`Notes: ${an.map(pretty).join(" · ")}`;degreeBadge.textContent=longDeg[state.arp];chipGrid.innerHTML="";cs.forEach((x,i)=>{const el=document.createElement("div");el.className="chip"+(i===state.arp?" active":"");const shape=shapeActualName(x,state.capo);el.innerHTML=state.view==="chord"?`<div class="deg">${i+1} · ${roman[i]}</div><div class="name">${chordName(x.rootName,x.quality)}</div><div class="qual">${state.capo?shape+" shape":"shape"}</div>`:`<div class="deg">${i+1} · ${roman[i]}</div><div class="name">${chordName(x.rootName,x.quality)}</div><div class="qual">${x.quality}</div>`;el.onclick=()=>{state.arp=i;render(false)};chipGrid.appendChild(el)});if(state.view==="lead"){drawFretboard(s,an,c.root);lesson.innerHTML=state.pattern==="full"?`<b>Lead mode:</b> ${INSTRUMENTS[state.instrument].label} tuning. Full board. Change key and everything shifts correctly.`:`<b>Pattern mode:</b> generated from ${state.key} ${state.mode} on ${INSTRUMENTS[state.instrument].label}. Each string shows up to 3 notes from the selected position.`}else{renderChordMode(c);lesson.innerHTML=(state.instrument==="bass"||state.instrument==="ukulele")?`<b>Chord mode:</b> this shows chord tones for ${INSTRUMENTS[state.instrument].label}. Lead Mode maps where to play them.`:`<b>Chord mode:</b> open shapes show when possible. Otherwise V13 falls back to a movable barre chord.`}}
function getFretWindow(){if(state.pattern==="full")return[0,12];const pat=Number(state.pattern.split("-")[1]);return get3NPSWindow(pat)}
function get3NPSWindow(pat){const s=scale();const target=s[pat];let candidates=[];for(let f=0;f<=17;f++){if((idx("E")+f)%12===target)candidates.push(f)}let start=candidates.find(f=>f>=0&&f<=12)??candidates[0]??0;if(start>12)start-=12;if(start<0)start+=12;let min=Math.max(0,start-1),max=Math.min(17,start+6);if(max-min<6){max=Math.min(17,min+6)}return[min,max]}
function notesFor3NPS(open,start,end){const out=[];for(let f=start;f<=Math.min(24,end+5);f++){const n=(idx(open)+f)%12;if(scale().includes(n))out.push(f);if(out.length>=3)break}return out.filter(f=>f>=start&&f<=end)}
function applyZoom(){if(fretInner)fretInner.style.width=state.zoom+"%"}
function drawFretboard(s,an,root){const[start,end]=getFretWindow(),count=end-Math.max(1,start)+1,is3=state.pattern!=="full";document.documentElement.style.setProperty("--fret-count",count);const nums=[]; for(let n=Math.max(1,start); n<=end; n++) nums.push(`<div>${n}</div>`); fretNums.innerHTML="<div>open</div>"+nums.join("");fretboard.innerHTML="";STRINGS.forEach(open=>{const row=document.createElement("div");row.className="string";const allowed=is3?notesFor3NPS(open,start,end):null;const oi=idx(open);
  const openNoteNum=oi%12, openInS=s.includes(openNoteNum)&&(!is3||allowed.includes(0)), openInA=an.includes(openNoteNum)&&(!is3||allowed.includes(0)), openIsR=openNoteNum===root;
  const label=document.createElement("div"); label.className="slabel"; label.innerHTML=`<span class="stringText">${open}</span>`;
  const openNote=document.createElement("div"); let openCls="note"; if(state.showScale&&openInS)openCls+=" scale"; if(openInA)openCls+=" arp"; if(openInA&&openIsR)openCls+=" root"; if(state.showScale&&openInS&&openInA)openCls+=" both"; openNote.className=openCls; openNote.textContent=(state.showNames&&(openInA||(state.showScale&&openInS)))?simple(openNoteNum):open; label.appendChild(openNote); row.appendChild(label);
  for(let f=Math.max(1,start);f<=end;f++){const n=(oi+f)%12,inS=s.includes(n)&&(!is3||allowed.includes(f)),inA=an.includes(n)&&(!is3||allowed.includes(f)),isR=n===root;const cell=document.createElement("div");cell.className="fret";const note=document.createElement("div");let cls="note";if(state.showScale&&inS)cls+=" scale";if(inA)cls+=" arp";if(inA&&isR)cls+=" root";if(state.showScale&&inS&&inA)cls+=" both";note.className=cls;note.textContent=(state.showNames&&(inA||(state.showScale&&inS)))?simple(n):"";cell.appendChild(note);row.appendChild(cell)}fretboard.appendChild(row)});applyZoom()}
function barreShapeFor(actual){const q=actual.endsWith("dim")?"dim":actual.endsWith("m")?"min":"maj";const root=actual.replace("dim","").replace("m","");let r=idx(root);if(q==="dim")return{type:"dim",root,actual};if(q==="maj"){let eFret=(r-idx("E")+12)%12;if(eFret>0)return{type:"E major barre",base:eFret,actual};let aFret=(r-idx("A")+12)%12;return{type:"A major barre",base:aFret||12,actual}}let eFret=(r-idx("E")+12)%12;if(eFret>0)return{type:"E minor barre",base:eFret,actual};let aFret=(r-idx("A")+12)%12;return{type:"A minor barre",base:aFret||12,actual}}
function renderChordMode(c){const actual=chordName(c.rootName,c.quality),shape=shapeActualName(c,state.capo),open=OPEN[shape];shapeTitle.innerHTML=`${chordLong(c.rootName,c.quality)} <span>${actual}</span>`;
if(state.instrument==="bass"){const tones=chordInts(c.quality).map(x=>pretty(c.root+x)).join(" · ");shapeSub.innerHTML=`Bass version: focus on chord tones <b>${tones}</b>. Use Lead Mode to map them across the neck.`;diagramMount.innerHTML=`<div class="diagram"><div class="noShape">Bass chord tones:<br><br><b>${tones}</b></div></div>`;return}
if(state.instrument==="ukulele"){const uke=UKE_OPEN[actual]||UKE_OPEN[shape];const tones=chordInts(c.quality).map(x=>pretty(c.root+x)).join(" · ");if(uke){shapeSub.innerHTML=state.capo?`Capo ${state.capo}: try this ukulele <b>${shape}</b> shape. It sounds like <b>${actual}</b>.`:`Ukulele shape for <b>${actual}</b>. Chord tones: <b>${tones}</b>.`;diagramMount.innerHTML=makeUkeDiagram(uke);return}shapeSub.innerHTML=`Ukulele chord tones: <b>${tones}</b>. No simple saved shape for this one yet.`;diagramMount.innerHTML=`<div class="diagram"><div class="noShape">Ukulele chord tones:<br><br><b>${tones}</b></div></div>`;return}
if(open){shapeSub.innerHTML=state.capo?`Capo ${state.capo}: play a <b>${shape}</b> shape. It sounds like <b>${actual}</b>.`:`Open shape for <b>${actual}</b>.`;diagramMount.innerHTML=makeOpenDiagram(open);return}
const b=barreShapeFor(actual);shapeSub.innerHTML=`Use this <b>${b.type}</b> shape. Barre at fret <b>${b.base||"?"}</b>.`;diagramMount.innerHTML=makeBarreDiagram(b)}
function makeOpenDiagram(shape){let html=`<div class="diagram"><div class="openRow">${shape.open.map(x=>`<div>${x==="x"?"x":x==="o"?"o":""}</div>`).join("")}</div>`;html+=gridLines();shape.f.forEach(f=>{html+=finger(f[0],f[1],f[2])});html+=`<div class="stringNames"><div>E</div><div>A</div><div>D</div><div>G</div><div>B</div><div>e</div></div></div>`;return html}
function makeBarreDiagram(b){if(b.type==="dim"){return `<div class="diagram"><div class="noShape">Diminished chords vary.<br><br>Use the notes from Lead Mode or a movable dim7 shape.</div></div>`}let html=`<div class="diagram"><div class="fretLabel">fr ${b.base}</div><div class="openRow"><div></div><div></div><div></div><div></div><div></div><div></div></div>`;html+=gridLines();if(b.type==="E major barre"){html+=barre(6,1,1,6);html+=finger(5,3,3)+finger(4,3,4)+finger(3,2,2)}else if(b.type==="E minor barre"){html+=barre(6,1,1,6);html+=finger(5,3,3)+finger(4,3,4)}else if(b.type==="A major barre"){html+=barre(5,1,1,5);html+=finger(4,3,2)+finger(3,3,3)+finger(2,3,4)}else{html+=barre(5,1,1,5);html+=finger(4,3,3)+finger(3,3,4)+finger(2,2,2)}html+=`<div class="stringNames"><div>E</div><div>A</div><div>D</div><div>G</div><div>B</div><div>e</div></div></div>`;return html}
function gridLines(){let h="";for(let i=0;i<6;i++){const left=17+(90/5)*i;h+=`<div class="vline" style="left:${left}px"></div>`}for(let i=0;i<5;i++){const top=29+(96/4)*i;h+=`<div class="hline" style="top:${top}px"></div>`}return h}
function finger(string,fret,num){const left=17+(90/5)*(6-string),top=29+(96/4)*(fret-.5);return `<div class="finger" style="left:${left}px;top:${top}px">${num}</div>`}
function barre(fromString,toString,fret,num){const left1=17+(90/5)*(6-fromString),left2=17+(90/5)*(6-toString),top=29+(96/4)*(fret-.5),left=Math.min(left1,left2)-9,width=Math.abs(left2-left1)+18;return `<div class="barre" style="left:${left}px;top:${top}px;width:${width}px">${num}</div>`}

function makeUkeDiagram(shape){
 let html=`<div class="diagram"><div class="openRow" style="grid-template-columns:repeat(4,1fr);left:24px;right:24px">${shape.open.map(x=>`<div>${x==="x"?"x":x==="o"?"o":""}</div>`).join("")}</div>`;
 html+=ukeGridLines();
 shape.f.forEach(f=>{if(f[1]>0)html+=ukeFinger(f[0],f[1],f[2])});
 html+=`<div class="stringNames" style="grid-template-columns:repeat(4,1fr);left:24px;right:24px"><div>G</div><div>C</div><div>E</div><div>A</div></div></div>`;
 return html;
}
function ukeGridLines(){
 let h="";
 for(let i=0;i<4;i++){const left=24+(76/3)*i;h+=`<div class="vline" style="left:${left}px"></div>`}
 for(let i=0;i<5;i++){const top=29+(96/4)*i;h+=`<div class="hline" style="top:${top}px;left:24px;right:24px"></div>`}
 return h;
}
function ukeFinger(string,fret,num){
 const left=24+(76/3)*(4-string),top=29+(96/4)*(fret-.5);
 return `<div class="finger" style="left:${left}px;top:${top}px">${num}</div>`;
}

setup();
</script>
</body>
</html>
